name: Update Profiles After Tournament

on:
  workflow_dispatch:
    inputs:
      tournament:
        description: 'Tournament slug (e.g. madrid2026)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Score remaining predictions and update profiles
        run: |
          python courtiq_engine.py results \
            --tournament ${{ github.event.inputs.tournament }} \
            --all-rounds

      - name: Rebuild site
        run: python courtiq_engine.py site --output docs/index.html

      - name: Commit
        run: |
          git config user.name  "CourtIQ Bot"
          git config user.email "courtiq-bot@users.noreply.github.com"
          git add reports/ data/ docs/index.html -f
          git diff --staged --quiet || git commit -m "profiles: post-${{ github.event.inputs.tournament }}"
          git push
